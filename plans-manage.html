<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>企画管理 — ASOBI CREATE PARK</title>
<style>
:root {
  --orange: #FF6B35;
  --green: #2D9E6B;
  --green-light: #4CAF78;
  --navy: #1A1A2E;
  --light: #F8F9FA;
  --gray: #6C757D;
  --card-shadow: 0 4px 20px rgba(0,0,0,0.08);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Helvetica Neue', 'Hiragino Kaku Gothic ProN', sans-serif; background: #FAFAF8; color: var(--navy); min-height: 100vh; }
.site-header { background: white; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 200; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.header-inner { display: flex; align-items: center; justify-content: space-between; padding: 12px 28px; max-width: 1200px; margin: 0 auto; }
.logo { display: flex; align-items: center; gap: 8px; text-decoration: none; }
.logo-icon { font-size: 24px; }
.logo-text { display: flex; flex-direction: column; line-height: 1.1; }
.logo-main { font-size: 15px; font-weight: 900; letter-spacing: 1px; color: var(--navy); }
.logo-main span { color: var(--orange); }
.logo-sub { font-size: 10px; color: var(--gray); }
.header-back { font-size: 13px; color: var(--gray); text-decoration: none; }
.header-back:hover { color: var(--navy); }
.auth-required { max-width: 480px; margin: 100px auto; padding: 0 20px; text-align: center; }
.auth-required .icon { font-size: 48px; margin-bottom: 16px; }
.auth-required h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
.auth-required p { color: var(--gray); font-size: 14px; margin-bottom: 24px; }
.btn-to-login { display: inline-block; background: var(--green); color: white; border-radius: 10px; padding: 12px 28px; font-size: 14px; font-weight: 700; text-decoration: none; }
.main-wrap { max-width: 960px; margin: 0 auto; padding: 28px 20px 80px; }
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 12px; }
.page-title { font-size: 22px; font-weight: 900; }
.page-title span { color: var(--green); }
.org-badge { font-size: 13px; color: var(--gray); margin-top: 4px; }
.btn-new-plan { background: var(--green); color: white; border: none; border-radius: 10px; padding: 10px 20px; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
.btn-new-plan:hover { background: var(--green-light); }
.tab-nav { display: flex; border-bottom: 2px solid #eee; margin-bottom: 24px; }
.tab-btn { background: none; border: none; padding: 10px 18px; font-size: 14px; font-weight: 600; color: var(--gray); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; }
.tab-btn.active { color: var(--green); border-bottom-color: var(--green); }
.tab-pane { display: none; }
.tab-pane.active { display: block; }
.plans-list { display: flex; flex-direction: column; gap: 16px; }
.plan-card { background: white; border-radius: 16px; padding: 20px; box-shadow: var(--card-shadow); display: flex; gap: 16px; align-items: flex-start; }
.plan-card-emoji { font-size: 36px; flex-shrink: 0; width: 56px; height: 56px; background: #f0faf5; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
.plan-card-body { flex: 1; }
.plan-card-head { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
.plan-title { font-size: 16px; font-weight: 700; }
.plan-status-badge { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
.plan-status-badge.draft { background: #fff3cd; color: #856404; }
.plan-status-badge.recruiting { background: #e8f5ee; color: var(--green); }
.plan-status-badge.closed { background: #f0f0f0; color: var(--gray); }
.plan-meta { font-size: 12px; color: var(--gray); display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; }
.plan-stats { display: flex; gap: 16px; font-size: 13px; margin-bottom: 12px; }
.plan-stat { display: flex; align-items: center; gap: 4px; color: var(--gray); }
.plan-stat .count { font-weight: 700; color: var(--navy); }
.plan-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.btn-sm { font-size: 12px; padding: 6px 14px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; }
.btn-sm.publish { background: var(--green); color: white; }
.btn-sm.publish:hover { background: var(--green-light); }
.btn-sm.close-plan { background: #f0f0f0; color: var(--gray); }
.btn-sm.reopen { background: var(--orange); color: white; }
.btn-sm.edit { background: white; border: 2px solid #ddd; color: var(--navy); }
.btn-sm.edit:hover { border-color: var(--navy); }
.btn-sm.view-hands { background: white; border: 2px solid var(--green); color: var(--green); }
.hands-section { margin-top: 14px; border-top: 1px solid #f0f0f0; padding-top: 14px; }
.hands-section h4 { font-size: 13px; font-weight: 700; margin-bottom: 10px; }
.hand-item { background: #f8f8f8; border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; font-size: 13px; }
.hand-item-name { font-weight: 700; margin-bottom: 4px; }
.hand-item-msg { color: var(--gray); }
.hand-item-status { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-top: 6px; }
.hand-item-status.pending { background: #fff3cd; color: #856404; }
.hand-item-status.accepted { background: #e8f5ee; color: var(--green); }
.hand-item-status.declined { background: #fef0f0; color: #c0392b; }
.empty-state { text-align: center; padding: 60px 20px; }
.empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; }
.empty-state p { color: var(--gray); font-size: 15px; margin-bottom: 20px; }
.form-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 500; overflow-y: auto; padding: 20px; }
.form-overlay.open { display: block; }
.form-card { background: white; border-radius: 20px; padding: 32px; max-width: 560px; margin: 40px auto; }
.form-card h2 { font-size: 20px; font-weight: 900; margin-bottom: 6px; }
.form-sub { font-size: 13px; color: var(--gray); margin-bottom: 28px; }
.form-group { margin-bottom: 18px; }
.form-group label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 6px; }
.form-group input, .form-group textarea, .form-group select { width: 100%; border: 2px solid #e8e8e8; border-radius: 10px; padding: 10px 14px; font-size: 14px; font-family: inherit; transition: border-color 0.2s; }
.form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: var(--green); }
.form-group textarea { resize: vertical; min-height: 90px; }
.form-hint { font-size: 11px; color: var(--gray); margin-top: 4px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-actions { display: flex; gap: 10px; margin-top: 24px; }
.btn-cancel { flex: 1; background: white; border: 2px solid #eee; border-radius: 10px; padding: 12px; font-size: 14px; cursor: pointer; }
.btn-submit { flex: 2; background: var(--green); color: white; border: none; border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; }
.btn-submit:hover { background: var(--green-light); }
.btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
.loading-state { text-align: center; padding: 60px; color: var(--gray); }
.spinner { width: 36px; height: 36px; border: 3px solid #eee; border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
@media (max-width: 600px) {
  .plan-card { flex-direction: column; }
  .form-row { grid-template-columns: 1fr; }
  .header-inner { padding: 12px 16px; }
  .page-header { flex-direction: column; align-items: flex-start; }
}
</style>
</head>
<body>
<header class="site-header">
  <div class="header-inner">
    <a href="index.html" class="logo">
      <img src="assets/ACP-logo.jpg" alt="ASOBI CREATE PARK やりたいを、カタチに。" style="height:40px;width:auto;display:block;">
    </a>
    <a href="login.html" class="header-back">← 管理画面に戻る</a>
  </div>
</header>

<div id="authGuard" style="display:none;">
  <div class="auth-required">
    <div class="icon">🔒</div>
    <h2>企画者ログインが必要です</h2>
    <p>この画面は登録団体（企画者）専用です。</p>
    <a href="login.html" class="btn-to-login">企画者ログインへ</a>
  </div>
</div>

<div id="mainContent" style="display:none;">
  <div class="main-wrap">
    <div class="page-header">
      <div>
        <div class="page-title">📋 <span>企画管理</span></div>
        <div class="org-badge" id="orgBadge">読み込み中…</div>
      </div>
      <button class="btn-new-plan" onclick="openPlanForm()">＋ 新しい企画を作る</button>
    </div>
    <div class="tab-nav">
      <button class="tab-btn active" onclick="switchTab('all', this)">すべて</button>
      <button class="tab-btn" onclick="switchTab('draft', this)">下書き</button>
      <button class="tab-btn" onclick="switchTab('recruiting', this)">🟢 募集中</button>
      <button class="tab-btn" onclick="switchTab('closed', this)">🔒 締め切り</button>
    </div>
    <div id="pane-all" class="tab-pane active"><div class="loading-state"><div class="spinner"></div><p>読み込み中...</p></div></div>
    <div id="pane-draft" class="tab-pane"></div>
    <div id="pane-recruiting" class="tab-pane"></div>
    <div id="pane-closed" class="tab-pane"></div>
  </div>
</div>

<div class="form-overlay" id="planFormOverlay">
  <div class="form-card">
    <h2 id="formTitle">＋ 新しい企画を作る</h2>
    <p class="form-sub">準備中の企画を登録します。「募集中」にすると支援者が閲覧・申込できます。</p>
    <input type="hidden" id="editPlanId">
    <div class="form-group">
      <label>企画タイトル <span style="color:red">*</span></label>
      <input type="text" id="planTitle" placeholder="例：夏祭り屋台企画2026" maxlength="80">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>カテゴリ</label>
        <select id="planCategory">
          <option value="">選択してください</option>
          <option value="食事・屋台">🍜 食事・屋台</option>
          <option value="あそび">🎮 あそび</option>
          <option value="防災">🚒 防災</option>
          <option value="工作">✂️ 工作</option>
          <option value="水遊び">💧 水遊び</option>
          <option value="音楽">🎵 音楽</option>
          <option value="スポーツ">⚽ スポーツ</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="form-group">
        <label>想定開催日</label>
        <input type="date" id="planDate">
      </div>
    </div>
    <div class="form-group">
      <label>開催場所</label>
      <input type="text" id="planLocation" placeholder="例：世田谷区〇〇公園">
    </div>
    <div class="form-group">
      <label>企画の概要</label>
      <textarea id="planDescription" placeholder="どんな企画か、必要な人手・スキルなど、支援者に伝えたいことを書いてください。"></textarea>
    </div>
    <div class="form-group">
      <label>ステータス</label>
      <select id="planStatus">
        <option value="draft">下書き（支援者には非公開）</option>
        <option value="recruiting">🟢 支援者募集中（公開）</option>
      </select>
      <div class="form-hint">「支援者募集中」にすると支援者が閲覧・申込できます。</div>
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closePlanForm()">キャンセル</button>
      <button class="btn-submit" onclick="savePlan()" id="btnSavePlan">保存する</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL      = 'https://hlgbazcqekvjukbjtskt.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhsZ2JhemNxZWt2anVrYmp0c2t0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMjgxMzksImV4cCI6MjA5NzkwNDEzOX0.QwXexU1f4vjeXrVsGU3ayZsW9gLj7XIcbqkHSlAsEm8';
const HEADERS = { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json' };
let currentOrg = null, allPlans = [];

document.addEventListener('DOMContentLoaded', () => {
  const saved = sessionStorage.getItem('acp_org');
  if (!saved) { document.getElementById('authGuard').style.display = 'block'; return; }
  try {
    currentOrg = JSON.parse(saved);
    document.getElementById('orgBadge').textContent = `🏢 ${currentOrg.org_name}`;
    document.getElementById('mainContent').style.display = 'block';
    loadPlans();
  } catch(e) { document.getElementById('authGuard').style.display = 'block'; }
});

function switchTab(status, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(`pane-${status}`).classList.add('active');
  renderPlans(status);
}

async function loadPlans() {
  document.getElementById('pane-all').innerHTML = '<div class="loading-state"><div class="spinner"></div><p>読み込み中...</p></div>';
  try {
    const plansRes = await fetch(`${SUPABASE_URL}/rest/v1/plans?organization_id=eq.${currentOrg.id}&order=created_at.desc`, { headers: HEADERS });
    allPlans = await plansRes.json();
    if (allPlans.length > 0) {
      const planIds = allPlans.map(p => p.id).join(',');
      const handsRes = await fetch(`${SUPABASE_URL}/rest/v1/support_hands?plan_id=in.(${planIds})&select=plan_id,id,status,message`, { headers: HEADERS });
      const hands = await handsRes.json();
      allPlans = allPlans.map(plan => ({ ...plan, _hands: hands.filter(h => h.plan_id === plan.id) }));
    }
    renderPlans('all');
  } catch(e) { document.getElementById('pane-all').innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><p>読み込みエラー：${e.message}</p></div>`; }
}

function renderPlans(status) {
  const pane = document.getElementById(`pane-${status}`);
  const plans = status === 'all' ? allPlans : allPlans.filter(p => p.status === status);
  const labels = { all:'企画がまだありません。', draft:'下書きの企画はありません。', recruiting:'募集中の企画はありません。', closed:'締め切り済みの企画はありません。' };
  if (!plans.length) { pane.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><p>${labels[status]||''}</p><button class="btn-new-plan" onclick="openPlanForm()" style="display:inline-block;padding:10px 20px;">＋ 最初の企画を作る</button></div>`; return; }
  pane.innerHTML = '<div class="plans-list"></div>';
  const list = pane.querySelector('.plans-list');
  plans.forEach(plan => list.appendChild(buildPlanCard(plan)));
}

function buildPlanCard(plan) {
  const card = document.createElement('div');
  card.className = 'plan-card';
  const catEmoji = {'食事・屋台':'🍜','あそび':'🎮','防災':'🚒','工作':'✂️','水遊び':'💧','音楽':'🎵','スポーツ':'⚽'}[plan.category]||'🎪';
  const statusLabel = {draft:'下書き',recruiting:'🟢 募集中',closed:'🔒 締め切り'}[plan.status]||plan.status;
  const hands = plan._hands||[];
  const pendingCount = hands.filter(h=>h.status==='pending').length;
  const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  let actionButtons = '';
  if (plan.status==='draft') actionButtons = `<button class="btn-sm publish" onclick="updatePlanStatus(${plan.id},'recruiting')">🟢 募集開始</button>`;
  else if (plan.status==='recruiting') actionButtons = `<button class="btn-sm close-plan" onclick="updatePlanStatus(${plan.id},'closed')">🔒 締め切る</button>`;
  else if (plan.status==='closed') actionButtons = `<button class="btn-sm reopen" onclick="updatePlanStatus(${plan.id},'recruiting')">🔄 再募集</button>`;
  card.innerHTML = `
    <div class="plan-card-emoji">${catEmoji}</div>
    <div class="plan-card-body">
      <div class="plan-card-head">
        <div class="plan-title">${esc(plan.title)}</div>
        <span class="plan-status-badge ${plan.status}">${statusLabel}</span>
      </div>
      <div class="plan-meta">
        ${plan.category?`<span>${catEmoji} ${esc(plan.category)}</span>`:''}
        ${plan.target_date?`<span>📅 ${plan.target_date}</span>`:''}
        ${plan.location?`<span>📍 ${esc(plan.location)}</span>`:''}
        <span>🕐 ${new Date(plan.created_at).toLocaleDateString('ja-JP')}</span>
      </div>
      ${plan.description?`<div style="font-size:13px;color:var(--gray);margin-bottom:10px;line-height:1.5;">${esc(plan.description).substring(0,120)}${plan.description.length>120?'…':''}</div>`:''}
      <div class="plan-stats">
        <div class="plan-stat">🙋 手を上げた人 <span class="count">${hands.length}</span>名</div>
        ${pendingCount>0?`<div class="plan-stat" style="color:var(--orange);">⏳ 未対応 <span class="count" style="color:var(--orange);">${pendingCount}</span>名</div>`:''}
      </div>
      <div class="plan-actions">
        <button class="btn-sm edit" onclick="openPlanForm(${plan.id})">✏️ 編集</button>
        ${actionButtons}
        ${hands.length>0?`<button class="btn-sm view-hands" onclick="toggleHands(${plan.id},this)">🙋 申込者を見る</button>`:''}
      </div>
      <div class="hands-section" id="hands-${plan.id}" style="display:none;">${renderHandsList(hands)}</div>
    </div>`;
  return card;
}

function renderHandsList(hands) {
  if (!hands.length) return '<p style="font-size:13px;color:var(--gray);">まだ誰も手を上げていません。</p>';
  const statusMap = {pending:'⏳ 未対応',accepted:'✅ 対応済み',declined:'❌ 辞退'};
  return hands.map(h=>`<div class="hand-item"><div class="hand-item-name">🙋 支援者 #${h.id}</div>${h.message?`<div class="hand-item-msg">${String(h.message).replace(/</g,'&lt;')}</div>`:''}<span class="hand-item-status ${h.status}">${statusMap[h.status]||h.status}</span></div>`).join('');
}

function toggleHands(planId, btn) {
  const section = document.getElementById(`hands-${planId}`);
  const isOpen = section.style.display !== 'none';
  section.style.display = isOpen ? 'none' : 'block';
  btn.textContent = isOpen ? '🙋 申込者を見る' : '🔼 閉じる';
}

async function updatePlanStatus(planId, newStatus) {
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/plans?id=eq.${planId}`, { method: 'PATCH', headers: { ...HEADERS, 'Prefer': 'return=minimal' }, body: JSON.stringify({ status: newStatus }) });
    await loadPlans();
  } catch(e) { alert('エラー：' + e.message); }
}

function openPlanForm(planId) {
  document.getElementById('editPlanId').value = '';
  document.getElementById('formTitle').textContent = '＋ 新しい企画を作る';
  ['planTitle','planLocation','planDescription'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('planCategory').value = '';
  document.getElementById('planDate').value = '';
  document.getElementById('planStatus').value = 'draft';
  if (planId) {
    const plan = allPlans.find(p => p.id === planId);
    if (plan) {
      document.getElementById('editPlanId').value = plan.id;
      document.getElementById('formTitle').textContent = '✏️ 企画を編集する';
      document.getElementById('planTitle').value = plan.title||'';
      document.getElementById('planCategory').value = plan.category||'';
      document.getElementById('planDate').value = plan.target_date||'';
      document.getElementById('planLocation').value = plan.location||'';
      document.getElementById('planDescription').value = plan.description||'';
      document.getElementById('planStatus').value = plan.status||'draft';
    }
  }
  document.getElementById('planFormOverlay').classList.add('open');
}

function closePlanForm() { document.getElementById('planFormOverlay').classList.remove('open'); }

async function savePlan() {
  const title = document.getElementById('planTitle').value.trim();
  if (!title) { alert('企画タイトルを入力してください。'); return; }
  if (!currentOrg?.id) { alert('ログイン情報が見つかりません。再ログインしてください。'); return; }
  const btn = document.getElementById('btnSavePlan');
  btn.disabled = true; btn.textContent = '保存中…';
  const payload = { organization_id: currentOrg.id, title, category: document.getElementById('planCategory').value||null, target_date: document.getElementById('planDate').value||null, location: document.getElementById('planLocation').value.trim()||null, description: document.getElementById('planDescription').value.trim()||null, status: document.getElementById('planStatus').value };
  const editId = document.getElementById('editPlanId').value;
  try {
    if (editId) {
      await fetch(`${SUPABASE_URL}/rest/v1/plans?id=eq.${editId}`, { method: 'PATCH', headers: { ...HEADERS, 'Prefer': 'return=minimal' }, body: JSON.stringify(payload) });
    } else {
      await fetch(`${SUPABASE_URL}/rest/v1/plans`, { method: 'POST', headers: { ...HEADERS, 'Prefer': 'return=minimal' }, body: JSON.stringify(payload) });
    }
    closePlanForm();
    await loadPlans();
  } catch(e) { alert('エラー：' + e.message); }
  finally { btn.disabled = false; btn.textContent = '保存する'; }
}
</script>
</body>
</html>
