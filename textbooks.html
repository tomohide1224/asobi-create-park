<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教科書エリア | ASOBI CREATE PARK</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/pages/textbooks.css">
</head>
<body>

<div id="site-header"></div>

<!-- ヒーロー -->
<section class="hero">
  <div class="hero-badge">📚 LAYER 1 — TEXTBOOKS</div>
  <div class="hero-title">教科書エリア</div>
  <div class="hero-desc">あそびを企画する人のための事例集・ノウハウ集。<br>現場で使えるヒントを集めました。</div>
  <button class="btn-download-all" onclick="downloadAllAsExcel()">
    📥 全件をExcelでダウンロード
  </button>
</section>

<!-- フィルター -->
<div class="filter-wrap" id="filterWrap">
  <button class="filter-chip active" data-cat="all" onclick="setFilter('all')">すべて</button>
</div>

<!-- メイン -->
<main class="main">
  <div id="cardArea">
    <div class="state-msg">
      <div class="state-icon spin">&#9881;</div>
      <div>読み込み中...</div>
    </div>
  </div>
</main>

<!-- 詳細モーダル -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal-box" id="modalBox">
    <div class="modal-header">
      <div>
        <div class="modal-cat" id="modalCat"></div>
        <div class="modal-title" id="modalTitle"></div>
      </div>
      <button class="modal-close" onclick="closeModalDirect()">&#10005;</button>
    </div>
    <div class="modal-body">
      <div class="modal-tags" id="modalTags"></div>
      <div class="modal-content" id="modalContent"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-dl-single" id="modalDlBtn">📥 この記事をExcelでダウンロード</button>
    </div>
  </div>
</div>

<div id="site-footer"></div>

<!-- SheetJS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="/js/common.js"></script>
<script src="/js/pages/textbooks.js"></script>
<script>
  loadHeader();
  loadFooter();
</script>
</body>
</html>
