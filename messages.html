<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>メッセージ | ASOBI CREATE PARK</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/pages/messages.css">
</head>
<body>

<!-- カスタムヘッダー（緑背景・戻るボタン） -->
<div class="msg-header">
  <button class="msg-back" id="backBtn" onclick="goBack()">&#8592;</button>
  <div class="msg-header-info">
    <div class="msg-header-name" id="headerName">読み込み中...</div>
    <div class="msg-header-plan" id="headerPlan"></div>
  </div>
  <span class="hand-status" id="handStatus"></span>
</div>

<!-- メッセージリスト -->
<div class="msg-list" id="msgList">
  <div class="msg-center">
    <div class="msg-center-icon spin">&#9881;</div>
    <div class="msg-center-text">読み込み中...</div>
  </div>
</div>

<!-- 入力エリア -->
<div class="msg-input-area" id="inputArea">
  <textarea class="msg-textarea" id="msgInput" placeholder="メッセージを入力..." rows="1"
    oninput="autoResize(this)" onkeydown="handleKeydown(event)"></textarea>
  <button class="msg-send-btn" id="sendBtn" onclick="sendMessage()" disabled>&#9658;</button>
</div>

<script src="/js/pages/messages.js"></script>
</body>
</html>
