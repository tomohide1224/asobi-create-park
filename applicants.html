<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>支援申込の管理 | ASOBI CREATE PARK</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/pages/applicants.css">
</head>
<body>

<!-- カスタムヘッダー（緑背景・戻るボタン） -->
<div class="page-header">
  <button class="back-btn" onclick="goBack()">&#8592;</button>
  <div class="page-header-info">
    <div class="page-header-title">支援申込の管理</div>
    <div class="page-header-sub" id="planTitle">読み込み中...</div>
  </div>
  <span id="countBadge" style="font-size:12px;background:rgba(255,255,255,0.2);padding:4px 10px;border-radius:12px;font-weight:700;"></span>
</div>

<div class="filter-tabs">
  <button class="filter-tab active" data-filter="all" onclick="setFilter('all')">すべて</button>
  <button class="filter-tab" data-filter="pending" onclick="setFilter('pending')">⏳ 検討中</button>
  <button class="filter-tab" data-filter="accepted" onclick="setFilter('accepted')">✅ 承認済み</button>
  <button class="filter-tab" data-filter="declined" onclick="setFilter('declined')">❌ 見送り</button>
</div>

<div class="main">
  <div id="cardArea">
    <div class="center-msg">
      <div class="center-msg-icon spin">&#9881;</div>
      <div class="center-msg-text">読み込み中...</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<footer><strong>ASOBI CREATE PARK</strong> &copy; 2025</footer>

<script src="/js/pages/applicants.js"></script>
</body>
</html>
