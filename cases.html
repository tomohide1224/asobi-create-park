<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>事例・ヒントを見る | ASOBI CREATE PARK</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/pages/cases.css">
</head>
<body>

<div id="site-header"></div>

<div class="breadcrumb">
  <div class="breadcrumb-inner">
    <a href="/index.html">トップ</a>
    <span class="breadcrumb-sep">›</span>
    <span>事例・ヒントを見る</span>
  </div>
</div>

<div class="page-hero">
  <div class="page-hero-inner">
    <div class="hero-left">
      <h1>📚 事例・ヒントを見る</h1>
      <p>他の団体・地域のあそびやイベント事例を参考にして、企画のヒントにしよう。</p>
    </div>
    <div class="hero-count">
      <div class="hero-count-num" id="heroCount">—</div>
      <div class="hero-count-label">件の事例を掲載中</div>
    </div>
  </div>
</div>

<div class="page-layout">

  <aside class="filter-panel">
    <div class="filter-panel-title">🔍 絞り込み</div>

    <div class="filter-section">
      <div class="filter-label">ジャンル</div>
      <div class="filter-chips" id="catChips">
        <button class="filter-chip active" data-cat="all" onclick="filterCat(this,'all')">すべて</button>
      </div>
    </div>

    <div class="filter-section">
      <div class="filter-label">ノウハウ共有</div>
      <div class="filter-chips">
        <button class="filter-chip" id="chipKnowhow" onclick="toggleKnowhow(this)">💡 ポイントあり</button>
      </div>
    </div>

    <button class="filter-reset" onclick="resetFilters()">絞り込みをリセット</button>
  </aside>

  <main>
    <div class="search-bar">
      <input type="text" class="search-input" id="searchInput" placeholder="🔍 キーワードで検索（事例名・団体名）…" oninput="applyFilters()">
    </div>
    <div class="result-info" id="resultInfo">読み込み中...</div>
    <div class="cases-grid" id="casesGrid">
      <div class="loading-wrap">
        <div class="spinner"></div>
        <div style="font-size:14px;color:var(--gray);">事例を読み込み中...</div>
      </div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header" id="modalHeader"></div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>
<button class="modal-close-btn" id="modalCloseBtn" onclick="closeModal()">✕</button>

<div id="site-footer"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/common.js"></script>
<script src="/js/pages/cases.js"></script>
<script>
  loadHeaderMember();
  loadFooter();
</script>
</body>
</html>
