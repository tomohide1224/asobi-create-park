<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>イベント登録 | ASOBI CREATE PARK</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/css/common.css">
<style>
body { background: #F8F9FA; }
.em-wrap { max-width: 600px; margin: 0 auto; padding: 24px 16px 80px; }
.em-header { margin-bottom: 24px; }
.em-title { font-size: 22px; font-weight: 900; color: var(--navy); margin-bottom: 4px; }
.em-org { font-size: 13px; color: var(--gray); font-weight: 600; }

.em-card { background: white; border-radius: 20px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,.06); margin-bottom: 16px; }
.em-section-title { font-size: 13px; font-weight: 800; color: var(--green); letter-spacing: .05em; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid #E8F5E9; }

.form-group { margin-bottom: 18px; }
.form-group:last-child { margin-bottom: 0; }
.form-label { display: block; font-size: 12px; font-weight: 800; color: var(--navy); margin-bottom: 6px; }
.form-label .req { color: #E53935; margin-left: 3px; }
.form-label .hint { font-size: 11px; font-weight: 600; color: var(--gray); margin-left: 6px; }
.form-input { width: 100%; border: 1.5px solid #E0E0E0; border-radius: 10px; padding: 10px 14px; font-size: 14px; outline: none; transition: border-color .2s; font-family: inherit; box-sizing: border-box; }
.form-input:focus { border-color: var(--green); }
textarea.form-input { min-height: 90px; resize: vertical; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-hint { font-size: 11px; color: var(--gray); margin-top: 4px; line-height: 1.5; }

/* 画像アップロード */
.img-upload-area { border: 2px dashed #D0D0D0; border-radius: 14px; overflow: hidden; cursor: pointer; position: relative; min-height: 140px; display: flex; align-items: center; justify-content: center; background: #FAFAFA; transition: border-color .2s; }
.img-upload-area:hover { border-color: var(--green); }
.img-upload-area input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.img-preview { width: 100%; max-height: 200px; object-fit: cover; display: none; }
.img-preview.has-img { display: block; }
.img-placeholder { text-align: center; padding: 24px; }
.img-placeholder-icon { font-size: 36px; margin-bottom: 8px; }
.img-placeholder-label { font-size: 12px; color: var(--gray); }
.upload-progress { display: none; font-size: 13px; color: var(--green); text-align: center; margin-top: 8px; font-weight: 700; }

/* チェックボックス・ラジオボタン */
.check-group { display: flex; align-items: flex-start; gap: 12px; padding: 12px; border-radius: 12px; border: 1.5px solid #E8E8E8; margin-bottom: 10px; cursor: pointer; transition: border-color .2s, background .2s; }
.check-group:last-child { margin-bottom: 0; }
.check-group:hover { border-color: var(--green); background: #F9FFF9; }
.check-group.selected { border-color: var(--green); background: #F0FBF5; }
.check-group input[type="checkbox"],
.check-group input[type="radio"] { width: 18px; height: 18px; flex-shrink: 0; margin-top: 2px; accent-color: var(--green); cursor: pointer; }
.check-group-body { flex: 1; }
.check-group-label { font-size: 14px; font-weight: 800; color: var(--navy); }
.check-group-desc { font-size: 11px; color: var(--gray); margin-top: 2px; line-height: 1.5; }

/* 区切り */
.setting-divider { border: none; border-top: 1.5px dashed #E0E0E0; margin: 16px 0; }

/* 公開期間 */
.publish-dates-box { background: #F5F5F5; border-radius: 12px; padding: 14px; }

/* ステータス選択 */
.status-row { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
.status-btn { flex: 1; min-width: 90px; padding: 10px; border: 1.5px solid #E0E0E0; border-radius: 12px; font-size: 12px; font-weight: 700; cursor: pointer; background: white; color: #666; transition: all .2s; text-align: center; }
.status-btn.active { background: var(--green); border-color: var(--green); color: white; }

/* 送信ボタン */
.em-actions { display: flex; gap: 12px; margin-top: 20px; }
.btn-save { flex: 1; background: var(--green); color: white; border: none; padding: 16px; border-radius: 16px; font-size: 16px; font-weight: 900; cursor: pointer; transition: opacity .2s; }
.btn-save:hover { opacity: .9; }
.btn-save:disabled { background: #ccc; cursor: not-allowed; }
.btn-back { background: none; border: 1.5px solid #ddd; padding: 16px 20px; border-radius: 16px; font-size: 14px; font-weight: 700; color: var(--gray); cursor: pointer; }
.btn-back:hover { border-color: var(--gray); }

.em-error { display: none; background: #FFEBEE; border-radius: 12px; padding: 12px 16px; font-size: 13px; color: #C62828; font-weight: 700; margin-bottom: 16px; }
.em-success { display: none; background: #E8F5E9; border-radius: 12px; padding: 16px; text-align: center; font-size: 15px; color: var(--green); font-weight: 800; margin-bottom: 16px; }

/* Googleマップ埋め込み */
.maps-embed { display: none; margin-top: 10px; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 10px rgba(0,0,0,.06); }
.maps-embed-frame { width: 100%; height: 220px; border: 0; display: block; }
.maps-embed-link { display: inline-block; font-size: 12px; color: var(--green); font-weight: 700; text-decoration: none; margin-top: 6px; }
.maps-embed-link:hover { text-decoration: underline; }
</style>
</head>
<body>

<div id="site-header"></div>

<div class="em-wrap" id="mainWrap" style="display:none">
  <div class="em-header">
    <div class="em-title" id="pageTitle">📅 イベントを登録する</div>
    <div class="em-org" id="orgName"></div>
  </div>

  <div class="em-error" id="emError"></div>
  <div class="em-success" id="emSuccess">🎉 保存しました！</div>

  <!-- 基本情報 -->
  <div class="em-card">
    <div class="em-section-title">📋 基本情報</div>

    <div class="form-group">
      <label class="form-label">イベント画像</label>
      <div class="img-upload-area" id="imgArea">
        <input type="file" id="imgFile" accept="image/*" onchange="previewImage(this)">
        <img id="imgPreview" class="img-preview" src="" alt="">
        <div id="imgPlaceholder" class="img-placeholder">
          <div class="img-placeholder-icon">🖼️</div>
          <div class="img-placeholder-label">タップして画像を選択（JPEG/PNG・5MBまで）</div>
        </div>
      </div>
      <div class="upload-progress" id="imgProgress">📤 アップロード中...</div>
    </div>

    <div class="form-group">
      <label class="form-label">イベント名 <span class="req">*</span></label>
      <input type="text" id="ev_title" class="form-input" placeholder="例：親子で楽しむ自然体験" maxlength="80">
    </div>

    <div class="form-group">
      <label class="form-label">カテゴリ</label>
      <select id="ev_category_id" class="form-input">
        <option value="">選択してください</option>
      </select>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">開催日</label>
        <input type="date" id="ev_event_date" class="form-input">
      </div>
      <div class="form-group">
        <label class="form-label">参加費</label>
        <input type="text" id="ev_fee" class="form-input" placeholder="例：無料、500円/人" value="無料">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">開催場所</label>
      <input type="text" id="ev_location" class="form-input" placeholder="例：世田谷区○○公園" oninput="updateMapsLink(this.value)">
      <div class="maps-embed" id="mapsEmbedWrap">
        <iframe id="mapsEmbedFrame" class="maps-embed-frame" src="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
      </div>
      <a class="maps-embed-link" id="mapsEmbedLink" href="" target="_blank" rel="noopener" style="display:none">🗺️ Googleマップで大きく確認する →</a>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">対象</label>
        <input type="text" id="ev_target_audience" class="form-input" placeholder="例：3〜10歳">
      </div>
      <div class="form-group">
        <label class="form-label">定員</label>
        <input type="number" id="ev_max_participants" class="form-input" placeholder="例：30" min="1">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">イベント説明</label>
      <textarea id="ev_description" class="form-input" rows="4" placeholder="どんなイベントですか？楽しみ方や魅力を伝えてください。"></textarea>
    </div>

    <div class="form-group">
      <label class="form-label">外部イベントページURL <span class="hint">（任意）</span></label>
      <input type="url" id="ev_event_url" class="form-input" placeholder="https://example.com/event">
    </div>
  </div>

  <!-- 公開・申込設定 -->
  <div class="em-card">
    <div class="em-section-title">🌐 公開・申込設定</div>

    <!-- オープン/クローズド -->
    <div class="form-group">
      <div class="form-label" style="margin-bottom:10px">公開範囲</div>
      <label class="check-group" id="grp_public_open" onclick="onPublicChange()">
        <input type="radio" name="is_public" id="is_public_open" value="open">
        <div class="check-group-body">
          <div class="check-group-label">🌐 オープン（一般公開・参加申し込み受付）</div>
          <div class="check-group-desc">イベント一覧に表示され、誰でも参加・問い合わせを申し込めます。</div>
        </div>
      </label>
      <label class="check-group selected" id="grp_public_closed" onclick="onPublicChange()">
        <input type="radio" name="is_public" id="is_public_closed" value="closed" checked>
        <div class="check-group-body">
          <div class="check-group-label">🔒 クローズド（関係者限定）</div>
          <div class="check-group-desc">学校や企業など招待された方のみ。一般のイベント一覧には表示されません。</div>
        </div>
      </label>
    </div>

    <hr class="setting-divider">

    <!-- 手伝い募集（常時表示） -->
    <div class="form-group">
      <div class="form-label" style="margin-bottom:10px">スタッフ・手伝い募集</div>
      <label class="check-group" id="grp_help">
        <input type="checkbox" id="can_help">
        <div class="check-group-body">
          <div class="check-group-label">🙌 手伝い・スタッフを募集する</div>
          <div class="check-group-desc">運営スタッフやボランティアを募集します。オープン・クローズド問わず設定できます。</div>
        </div>
      </label>
    </div>

    <hr class="setting-divider">

    <!-- 公開期間（常時表示） -->
    <div class="form-group">
      <div class="form-label" style="margin-bottom:10px">公開期間 <span class="hint">（未入力で無期限）</span></div>
      <div class="publish-dates-box">
        <div class="form-row">
          <div class="form-group" style="margin-bottom:0">
            <label class="form-label">開始日時</label>
            <input type="datetime-local" id="publish_start_at" class="form-input">
          </div>
          <div class="form-group" style="margin-bottom:0">
            <label class="form-label">終了日時</label>
            <input type="datetime-local" id="publish_end_at" class="form-input">
          </div>
        </div>
      </div>
    </div>

    <hr class="setting-divider">

    <!-- ステータス -->
    <div>
      <div class="form-label" style="margin-bottom:8px">掲載ステータス</div>
      <div class="status-row">
        <button type="button" class="status-btn" id="statusDraft" onclick="setStatus('draft')">📝 下書き</button>
        <button type="button" class="status-btn active" id="statusActive" onclick="setStatus('active')">✅ 掲載中</button>
        <button type="button" class="status-btn" id="statusClosed" onclick="setStatus('closed')">🔒 終了</button>
        <button type="button" class="status-btn" id="statusPublished" onclick="setStatus('published')">📚 事例</button>
      </div>
      <div class="form-hint" style="margin-top:6px">「掲載中」でイベント一覧に表示。「📚 事例」にすると、やってみた記録として事例ページに載ります。</div>
    </div>
  </div>

  <!-- ノウハウ・やってみた記録（任意） -->
  <div class="em-card">
    <div class="em-section-title">💡 ノウハウ・やってみた記録（任意）</div>
    <div class="form-hint" style="margin-bottom:14px">開催後に記入すると「事例（やってみた記録）」として他の企画者の参考になります。ステータスを「📚 事例」にすると事例ページに載ります。</div>

    <div class="form-group">
      <label class="form-label">よかった点・成功のポイント</label>
      <textarea id="ev_knowhow_summary" class="form-input" rows="3" placeholder="うまくいったこと、盛り上がったポイントなど"></textarea>
    </div>

    <div class="form-group">
      <label class="form-label">必要な道具・準備物</label>
      <textarea id="ev_tools_needed" class="form-input" rows="2" placeholder="例：ブルーシート、軍手、スコップ…"></textarea>
    </div>

    <div class="form-group">
      <label class="form-label">これから企画したい人へのメモ</label>
      <textarea id="ev_tips" class="form-input" rows="2" placeholder="注意点、次にやるならこうする、など"></textarea>
    </div>
  </div>

  <input type="hidden" id="editEventId">
  <input type="hidden" id="currentStatus" value="active">
  <input type="hidden" id="currentImageUrl" value="">

  <div class="em-actions">
    <button type="button" class="btn-back" onclick="goBack()">← 戻る</button>
    <button type="button" class="btn-save" id="btnSave" onclick="saveEvent()">💾 保存する</button>
  </div>
</div>

<div id="site-footer"></div>

<script src="/js/common.js"></script>
<script src="/js/utils.js"></script>
<script>
  loadHeaderMember();
  loadFooter();
</script>
<script>
const SUPABASE_URL = 'https://hlgbazcqekvjukbjtskt.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhsZ2JhemNxZWt2anVrYmp0c2t0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMjgxMzksImV4cCI6MjA5NzkwNDEzOX0.QwXexU1f4vjeXrVsGU3ayZsW9gLj7XIcbqkHSlAsEm8';
const HEADERS = {
  'apikey': SUPABASE_ANON_KEY,
  'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
  'Content-Type': 'application/json'
};

let currentOrg = null;

// ── Googleマップリンク ──────────────────────
function updateMapsLink(val) {
  val = (val || '').trim();
  const wrap = document.getElementById('mapsEmbedWrap');
  const frame = document.getElementById('mapsEmbedFrame');
  const link = document.getElementById('mapsEmbedLink');
  if (val) {
    const q = encodeURIComponent(val);
    frame.src = 'https://www.google.com/maps?q=' + q + '&output=embed';
    link.href = 'https://www.google.com/maps/search/?api=1&query=' + q;
    wrap.style.display = 'block';
    link.style.display = 'inline-block';
  } else {
    frame.src = '';
    wrap.style.display = 'none';
    link.style.display = 'none';
  }
}

// ── 初期化 ──────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  const saved = sessionStorage.getItem('acp_org');
  if (!saved) { window.location.href = '/login.html'; return; }
  try { currentOrg = JSON.parse(saved); } catch(e) { window.location.href = '/login.html'; return; }

  document.getElementById('orgName').textContent = '🏢 ' + (currentOrg.org_name || '');
  document.getElementById('mainWrap').style.display = '';

  await loadCategories();

  const editId = new URLSearchParams(location.search).get('edit');
  if (editId) {
    document.getElementById('pageTitle').textContent = '✏️ イベントを編集する';
    document.getElementById('editEventId').value = editId;
    await loadEvent(editId);
  }
});

async function loadCategories() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/event_categories?order=id`, { headers: HEADERS });
  if (!res.ok) return;
  const cats = await res.json();
  const sel = document.getElementById('ev_category_id');
  cats.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.id;
    opt.textContent = (c.emoji || '') + ' ' + c.name;
    sel.appendChild(opt);
  });
}

async function loadEvent(id) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/events?id=eq.${id}&limit=1`, { headers: HEADERS });
  if (!res.ok) return;
  const [ev] = await res.json();
  if (!ev) return;

  document.getElementById('ev_title').value = ev.title || '';
  document.getElementById('ev_category_id').value = ev.category_id || '';
  document.getElementById('ev_event_date').value = ev.event_date || '';
  document.getElementById('ev_fee').value = ev.fee || '無料';
  document.getElementById('ev_location').value = ev.location || '';
  updateMapsLink(ev.location || '');
  document.getElementById('ev_target_audience').value = ev.target_audience || ev.target || '';
  document.getElementById('ev_max_participants').value = ev.max_participants || '';
  document.getElementById('ev_description').value = ev.description || '';
  document.getElementById('ev_event_url').value = ev.event_url || '';

  // ノウハウ・やってみた記録
  document.getElementById('ev_knowhow_summary').value = ev.knowhow_summary || '';
  document.getElementById('ev_tools_needed').value = ev.tools_needed || '';
  document.getElementById('ev_tips').value = ev.tips || '';

  // オープン/クローズド
  const isOpen = !!ev.is_public || !!ev.can_participate;
  document.getElementById(isOpen ? 'is_public_open' : 'is_public_closed').checked = true;
  document.getElementById('grp_public_open').classList.toggle('selected', isOpen);
  document.getElementById('grp_public_closed').classList.toggle('selected', !isOpen);

  // 手伝い（独立）
  document.getElementById('can_help').checked = !!ev.can_help;

  // 公開期間
  if (ev.publish_start_at) document.getElementById('publish_start_at').value = ev.publish_start_at.slice(0, 16);
  if (ev.publish_end_at) document.getElementById('publish_end_at').value = ev.publish_end_at.slice(0, 16);

  document.getElementById('currentImageUrl').value = ev.image_url || '';
  if (ev.image_url) {
    const prev = document.getElementById('imgPreview');
    prev.src = ev.image_url; prev.classList.add('has-img');
    document.getElementById('imgPlaceholder').style.display = 'none';
  }
  setStatus(ev.status || 'active');
}

// ── オープン/クローズド切替（ビジュアルのみ） ──────────────────────
function onPublicChange() {
  setTimeout(() => {
    const isOpen = document.getElementById('is_public_open').checked;
    document.getElementById('grp_public_open').classList.toggle('selected', isOpen);
    document.getElementById('grp_public_closed').classList.toggle('selected', !isOpen);
  }, 0);
}

// ── ステータス選択 ──────────────────────
function setStatus(st) {
  document.getElementById('currentStatus').value = st;
  ['draft','active','closed','published'].forEach(s => {
    document.getElementById('status' + s.charAt(0).toUpperCase() + s.slice(1)).classList.toggle('active', s === st);
  });
}

// ── 画像 ──────────────────────
function previewImage(input) {
  if (!input.files || !input.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => {
    const prev = document.getElementById('imgPreview');
    prev.src = e.target.result; prev.classList.add('has-img');
    document.getElementById('imgPlaceholder').style.display = 'none';
  };
  reader.readAsDataURL(input.files[0]);
}

async function uploadImage(file, path) {
  const res = await fetch(`${SUPABASE_URL}/storage/v1/object/images/${path}`, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
      'Content-Type': file.type,
      'x-upsert': 'true'
    },
    body: file
  });
  if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err.message || '画像のアップロードに失敗しました'); }
  return `${SUPABASE_URL}/storage/v1/object/public/images/${path}`;
}

// ── 保存 ──────────────────────
async function saveEvent() {
  const title = document.getElementById('ev_title').value.trim();
  if (!title) { showError('イベント名は必須です。'); return; }
  if (!currentOrg?.id) { window.location.href = '/login.html'; return; }

  const btn = document.getElementById('btnSave');
  btn.disabled = true; btn.textContent = '保存中...';
  hideError();
  let saved = false;

  try {
    let image_url = document.getElementById('currentImageUrl').value || null;
    const fileInput = document.getElementById('imgFile');
    if (fileInput.files && fileInput.files[0]) {
      const file = fileInput.files[0];
      const ext = file.name.split('.').pop();
      const path = `events/${currentOrg.id}_${Date.now()}.${ext}`;
      document.getElementById('imgProgress').style.display = 'block';
      image_url = await uploadImage(file, path);
      document.getElementById('imgProgress').style.display = 'none';
    }

    const is_public = document.getElementById('is_public_open').checked;
    const can_participate = is_public;                     // オープン = 参加申込OK
    const can_help = document.getElementById('can_help').checked; // 独立設定
    const can_inquiry = is_public && !can_help;            // オープン＋手伝いなし = 問い合わせOK
    const start = document.getElementById('publish_start_at').value;
    const end = document.getElementById('publish_end_at').value;

    const payload = {
      title,
      category_id: document.getElementById('ev_category_id').value ? parseInt(document.getElementById('ev_category_id').value) : null,
      description: document.getElementById('ev_description').value.trim() || null,
      event_date: document.getElementById('ev_event_date').value || null,
      location: document.getElementById('ev_location').value.trim() || null,
      target_audience: document.getElementById('ev_target_audience').value.trim() || null,
      fee: document.getElementById('ev_fee').value.trim() || '無料',
      max_participants: document.getElementById('ev_max_participants').value ? parseInt(document.getElementById('ev_max_participants').value) : null,
      event_url: document.getElementById('ev_event_url').value.trim() || null,
      knowhow_summary: document.getElementById('ev_knowhow_summary').value.trim() || null,
      tools_needed: document.getElementById('ev_tools_needed').value.trim() || null,
      tips: document.getElementById('ev_tips').value.trim() || null,
      is_public,
      can_participate,
      can_help,
      can_inquiry,
      publish_start_at: start ? new Date(start).toISOString() : null,
      publish_end_at: end ? new Date(end).toISOString() : null,
      status: document.getElementById('currentStatus').value,
      image_url,
      organization_id: currentOrg.id,
      organizer_name: currentOrg.org_name || ''
    };

    const editId = document.getElementById('editEventId').value;
    let res;
    if (editId) {
      res = await fetch(`${SUPABASE_URL}/rest/v1/events?id=eq.${editId}`, {
        method: 'PATCH',
        headers: { ...HEADERS, 'Prefer': 'return=minimal' },
        body: JSON.stringify(payload)
      });
    } else {
      res = await fetch(`${SUPABASE_URL}/rest/v1/events`, {
        method: 'POST',
        headers: { ...HEADERS, 'Prefer': 'return=representation' },
        body: JSON.stringify(payload)
      });
      if (res.ok) {
        const [created] = await res.json();
        document.getElementById('editEventId').value = created.id;
        document.getElementById('pageTitle').textContent = '✏️ イベントを編集する';
        history.replaceState({}, '', `?edit=${created.id}`);
      }
    }
    if (!res.ok) { const err = await res.json(); throw new Error(err.message || '保存に失敗しました'); }
    // 保存完了を画面のどこにいても分かるように：画面下トースト＋ボタン表示切替
    saved = true;
    showToast(editId ? '✅ 更新しました！' : '🎉 登録しました！', 'success');
    document.getElementById('emSuccess').style.display = 'block';
    setTimeout(() => { document.getElementById('emSuccess').style.display = 'none'; }, 3000);
  } catch(e) {
    showError('エラー: ' + e.message);
    document.getElementById('imgProgress').style.display = 'none';
  } finally {
    btn.disabled = false;
    if (saved) {
      btn.textContent = '✅ 保存しました';
      setTimeout(() => { btn.textContent = '💾 保存する'; }, 2000);
    } else {
      btn.textContent = '💾 保存する';
    }
  }
}

function showError(msg) { const el = document.getElementById('emError'); el.textContent = msg; el.style.display = 'block'; el.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
function hideError() { document.getElementById('emError').style.display = 'none'; }
function goBack() { window.location.href = '/login.html'; }
</script>
</body>
</html>
