<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>あそびを探す | ASOBI CREATE PARK</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --orange: #FF6B35; --green: #2D9E6B; --green-light: #4CAF78; --navy: #1A1A2E; --light: #F8F9FA; --gray: #6C757D; }
    body { font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif; background: #F8F9FA; color: var(--navy); }

    /* HEADER */
    .site-header { background: white; border-bottom: 1px solid #F0F0F0; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .header-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; height: 64px; display: flex; align-items: center; gap: 32px; }
    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--green), var(--green-light)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .logo-main { font-size: 14px; font-weight: 900; color: var(--navy); letter-spacing: 0.05em; }
    .logo-main span { color: var(--green); }
    .logo-sub { font-size: 9px; color: var(--gray); }
    .site-nav { display: flex; gap: 4px; margin-left: auto; }
    .nav-link { color: #555; font-size: 13px; font-weight: 600; padding: 8px 14px; border-radius: 8px; text-decoration: none; transition: all 0.2s; }
    .nav-link:hover, .nav-link.active { background: #F0FBF5; color: var(--green); }
    .header-actions { display: flex; gap: 8px; align-items: center; }
    .btn-login { background: none; border: 1.5px solid #ddd; color: #555; padding: 7px 16px; border-radius: 20px; font-size: 12px; font-weight: 700; text-decoration: none; }
    .btn-register { background: var(--orange); color: white; padding: 8px 16px; border-radius: 20px; font-size: 12px; font-weight: 800; text-decoration: none; white-space: nowrap; }

    /* BREADCRUMB */
    .breadcrumb { background: white; border-bottom: 1px solid #eee; }
    .breadcrumb-inner { max-width: 1200px; margin: 0 auto; padding: 10px 24px; display: flex; gap: 8px; font-size: 12px; color: var(--gray); }
    .breadcrumb-inner a { color: var(--gray); text-decoration: none; }
    .breadcrumb-sep { color: #ccc; }

    /* PAGE HERO */
    .page-hero { background: linear-gradient(135deg, var(--green) 0%, var(--green-light) 100%); padding: 40px 24px 36px; }
    .page-hero-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
    .hero-left h1 { font-size: 28px; font-weight: 900; color: white; margin-bottom: 6px; }
    .hero-left p { font-size: 14px; color: rgba(255,255,255,0.85); line-height: 1.7; }
    .hero-count { background: rgba(255,255,255,0.2); backdrop-filter: blur(4px); border-radius: 16px; padding: 16px 24px; text-align: center; }
    .hero-count-num { font-size: 36px; font-weight: 900; color: white; line-height: 1; }
    .hero-count-label { font-size: 12px; color: rgba(255,255,255,0.85); margin-top: 4px; }

    /* MAIN LAYOUT */
    .page-layout { max-width: 1200px; margin: 32px auto; padding: 0 24px; display: grid; grid-template-columns: 260px 1fr; gap: 24px; align-items: start; }

    /* FILTER SIDEBAR */
    .filter-panel { background: white; border-radius: 20px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); position: sticky; top: 84px; }
    .filter-panel-title { font-size: 14px; font-weight: 800; color: var(--navy); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .filter-section { margin-bottom: 20px; }
    .filter-label { font-size: 11px; font-weight: 800; color: var(--gray); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
    .filter-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .filter-chip { padding: 6px 12px; border: 1.5px solid #E0E0E0; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; background: white; color: #555; }
    .filter-chip:hover { border-color: var(--green); color: var(--green); }
    .filter-chip.active { background: var(--green); border-color: var(--green); color: white; }
    .filter-reset { width: 100%; background: none; border: 1.5px solid #eee; border-radius: 12px; padding: 10px; font-size: 13px; font-weight: 700; color: var(--gray); cursor: pointer; margin-top: 8px; transition: all 0.2s; }
    .filter-reset:hover { border-color: var(--orange); color: var(--orange); }

    /* SEARCH BAR */
    .search-bar { background: white; border-radius: 16px; padding: 16px 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); margin-bottom: 16px; display: flex; gap: 12px; align-items: center; }
    .search-input { flex: 1; border: 1.5px solid #E0E0E0; border-radius: 12px; padding: 10px 16px; font-size: 14px; outline: none; transition: border-color 0.2s; }
    .search-input:focus { border-color: var(--green); }
    .search-btn { background: var(--green); color: white; border: none; padding: 10px 20px; border-radius: 12px; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; }
    .result-info { font-size: 13px; color: var(--gray); margin-bottom: 12px; font-weight: 600; }

    /* TAB */
    .tab-bar { display: flex; gap: 8px; margin-bottom: 16px; background: white; border-radius: 16px; padding: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .tab-btn { flex: 1; padding: 10px 16px; border: none; background: none; border-radius: 12px; font-size: 13px; font-weight: 700; cursor: pointer; color: #666; transition: all 0.2s; }
    .tab-btn.active { background: var(--green); color: white; }

    /* EVENT CARDS GRID */
    .events-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }

    /* CARD */
    .event-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.06); cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
    .event-card:hover { transform: translateY(-4px); box-shadow: 0 8px 32px rgba(0,0,0,0.12); }
    .card-thumb { height: 140px; display: flex; align-items: center; justify-content: center; position: relative; }
    .card-cat-badge { position: absolute; top: 12px; left: 12px; font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 10px; }
    .card-type-badge { position: absolute; top: 12px; right: 12px; font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 10px; background: rgba(255,255,255,0.9); color: var(--navy); }
    .card-body { padding: 16px 18px 20px; }
    .card-title { font-size: 15px; font-weight: 800; color: var(--navy); line-height: 1.4; margin-bottom: 10px; }
    .card-meta { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
    .card-meta-item { font-size: 12px; color: #666; display: flex; align-items: center; gap: 6px; }
    .card-footer { padding: 12px 18px; border-top: 1px solid #F5F5F5; display: flex; gap: 6px; flex-wrap: wrap; }
    .card-tag { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 10px; background: #F0F0F0; color: #555; }
    .card-tag.can-join { background: #E8F5E9; color: var(--green); }
    .card-tag.can-help { background: #FFF8E1; color: #F57F17; }

    /* CAT COLORS */
    .cat-1 { background: #E8F5E9; color: #2D9E6B; }
    .cat-2 { background: #E3F2FD; color: #1565C0; }
    .cat-3 { background: #F3E5F5; color: #7B1FA2; }
    .cat-4 { background: #FFF8E1; color: #F57F17; }
    .cat-5 { background: #FCE4EC; color: #C2185B; }
    .cat-6 { background: #E0F7FA; color: #00838F; }
    .cat-7 { background: #FBE9E7; color: #BF360C; }
    .cat-8 { background: #EFEBE9; color: #4E342E; }

    /* LOADING / EMPTY */
    .loading-wrap { text-align: center; padding: 60px 0; }
    .spinner { width: 36px; height: 36px; border: 3px solid #eee; border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { background: white; border-radius: 20px; padding: 48px 24px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-title { font-size: 18px; font-weight: 800; color: var(--navy); margin-bottom: 8px; }
    .empty-desc { font-size: 14px; color: var(--gray); }

    /* DETAIL MODAL */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; align-items: flex-end; justify-content: center; }
    .modal-overlay.show { display: flex; }
    .modal-sheet { background: white; border-radius: 24px 24px 0 0; width: 100%; max-width: 640px; max-height: 90vh; overflow-y: auto; }
    .modal-handle { width: 40px; height: 4px; background: #ddd; border-radius: 2px; margin: 14px auto 0; }
    .modal-header { padding: 20px 24px 16px; }
    .modal-category-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 12px; margin-bottom: 12px; }
    .modal-title { font-size: 22px; font-weight: 900; line-height: 1.4; margin-bottom: 6px; }
    .modal-organizer { font-size: 13px; color: var(--gray); font-weight: 600; }
    .modal-body { padding: 0 24px 32px; }
    .modal-desc { font-size: 14px; line-height: 1.9; color: #333; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #f0f0f0; }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .info-item { background: #F8F9FA; border-radius: 12px; padding: 14px 16px; }
    .info-label { font-size: 11px; font-weight: 700; color: var(--gray); margin-bottom: 4px; }
    .info-value { font-size: 14px; font-weight: 700; color: var(--navy); }
    .contact-box { background: linear-gradient(135deg, #F0FBF5, #E8F5E9); border-radius: 16px; padding: 20px; margin-top: 16px; border: 1.5px solid #A5D6A7; }
    .contact-title { font-size: 14px; font-weight: 800; color: var(--navy); margin-bottom: 8px; }
    .contact-email { font-size: 14px; color: var(--green); font-weight: 700; text-decoration: none; }
    .modal-close-btn { position: fixed; top: 16px; right: 16px; background: rgba(0,0,0,0.5); color: white; border: none; width: 36px; height: 36px; border-radius: 50%; font-size: 18px; cursor: pointer; z-index: 1001; display: none; align-items: center; justify-content: center; }
    .modal-close-btn.show { display: flex; }
    .form-section { margin-top: 24px; border-top: 1px solid #f0f0f0; padding-top: 20px; }
    .form-title { font-size: 16px; font-weight: 800; color: var(--navy); margin-bottom: 4px; }
    .form-sub { font-size: 12px; color: var(--gray); margin-bottom: 16px; }
    .form-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .form-tab { flex: 1; padding: 10px; border: 1.5px solid #E0E0E0; border-radius: 12px; font-size: 13px; font-weight: 700; cursor: pointer; background: white; color: #666; transition: all 0.2s; }
    .form-tab.active { background: var(--orange); border-color: var(--orange); color: white; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 12px; font-weight: 700; color: var(--navy); margin-bottom: 6px; }
    .form-group input, .form-group textarea { width: 100%; border: 1.5px solid #E0E0E0; border-radius: 10px; padding: 10px 14px; font-size: 14px; outline: none; transition: border-color 0.2s; }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--green); }
    .form-group textarea { min-height: 80px; resize: vertical; }
    .submit-btn { width: 100%; background: var(--orange); color: white; border: none; padding: 14px; border-radius: 14px; font-size: 15px; font-weight: 800; cursor: pointer; margin-top: 8px; transition: opacity 0.2s; }
    .submit-btn:hover { opacity: 0.9; }
    .submit-btn:disabled { background: #ccc; cursor: default; }
    .success-msg { display: none; background: #E8F5E9; border-radius: 12px; padding: 16px; text-align: center; font-size: 14px; font-weight: 700; color: var(--green); }

    footer { background: var(--navy); color: rgba(255,255,255,0.5); text-align: center; padding: 32px 24px; font-size: 12px; line-height: 2.0; margin-top: 48px; }
    footer strong { color: white; }
    .footer-nav { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-bottom: 16px; }
    .footer-nav a { color: rgba(255,255,255,0.5); text-decoration: none; font-size: 12px; }

    @media (max-width: 900px) {
      .page-layout { grid-template-columns: 1fr; }
      .filter-panel { position: static; display: none; }
      .filter-panel.mobile-open { display: block; }
      .events-grid { grid-template-columns: 1fr; }
      .site-nav { display: none; }
    }
  </style>
</head>
<body>

  <!-- FILTER SIDEBAR -->

    <div class="filter-section">

      <div class="filter-chips" id="catChips">
        <button class="filter-chip active" data-cat="all" onclick="filterCat(this,'all')">すべて</button>
      </div>

    <div class="filter-section">
      <div class="filter-label">募集種別</div>
      <div class="filter-chips">
        <button class="filter-chip active" data-type="all" onclick="filterType(this,'all')">すべて</button>
        <button class="filter-chip" data-type="join" onclick="filterType(this,'join')">✋ 参加者募集</button>
        <button class="filter-chip" data-type="help" onclick="filterType(this,'help')">🙌 スタッフ募集</button>
      </div>

    <button class="filter-reset" onclick="resetFilters()">絞り込みをリセット</button>
  </aside>

  <!-- MAIN CONTENT -->
  <main>
    <div class="search-bar">
      <input type="text" class="search-input" id="searchInput" placeholder="🔍 イベント名・団体名で検索…" oninput="applyFilters()">
      <button class="search-btn" onclick="applyFilters()">検索</button>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active" id="tabAll" onclick="switchTab('all')">🎪 すべてのあそび</button>
      <button class="tab-btn" id="tabJoin" onclick="switchTab('join')">✋ 参加できるあそび</button>

    <div class="result-info" id="resultInfo">読み込み中...</div>

<script>
  const SUPABASE_URL = 'https://hlgbazcqekvjukbjtskt.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhsZ2JhemNxZWt2anVrYmp0c2t0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMjgxMzksImV4cCI6MjA5NzkwNDEzOX0.QwXexU1f4vjeXrVsGU3ayZsW9gLj7XIcbqkHSlAsEm8';
  const CAT_COLORS = ['','cat-1','cat-2','cat-3','cat-4','cat-5','cat-6','cat-7','cat-8'];
  const THUMB_GRADIENTS = [
    'linear-gradient(135deg,#a5d6a7,#81c784)',
    'linear-gradient(135deg,#90caf9,#64b5f6)',
    'linear-gradient(135deg,#ce93d8,#ab47bc)',
    'linear-gradient(135deg,#ffe082,#ffca28)',
    'linear-gradient(135deg,#f48fb1,#e91e63)',
    'linear-gradient(135deg,#80deea,#00acc1)',
    'linear-gradient(135deg,#ffab91,#ff5722)',
    'linear-gradient(135deg,#bcaaa4,#8d6e63)',
  ];

  let client, allEvents = [], allCategories = [], allOrgs = [];
  let activeCat = 'all', activeTab = 'all', currentRequestType = '参加したい';

  window.addEventListener('DOMContentLoaded', async () => {
    client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const [catsRes, eventsRes, orgsRes] = await Promise.all([
      client.from('event_categories').select('*').order('id'),
      client.from('events').select('*, event_categories(name, emoji)').eq('status', 'active').order('id'),
      client.from('organizations').select('*')
    ]);
    allCategories = catsRes.data || [];
    allEvents = eventsRes.data || [];
    allOrgs = orgsRes.data || [];

    document.getElementById('heroCount').textContent = allEvents.length;

    // build category chips
    const chips = document.getElementById('catChips');
    allCategories.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'filter-chip';
      btn.dataset.cat = cat.id;
      btn.textContent = (cat.emoji || '') + ' ' + cat.name;
      btn.onclick = () => filterCat(btn, cat.id);
      chips.appendChild(btn);
    });

    // check URL param for staff tab
    if (new URLSearchParams(location.search).get('tab') === 'staff') switchTab('help');
    else applyFilters();
  });

  function filterCat(el, cat) {
    activeCat = cat;
    document.querySelectorAll('#catChips .filter-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    applyFilters();
  }

  function filterType(el, type) {
    document.querySelectorAll('[data-type]').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    if (type === 'all') switchTab('all');
    else if (type === 'join') switchTab('join');
    else switchTab('help');
  }

  function switchTab(tab) {
    activeTab = tab;
    ['tabAll','tabJoin','tabHelp'].forEach(id => document.getElementById(id).classList.remove('active'));
    document.getElementById(tab === 'all' ? 'tabAll' : tab === 'join' ? 'tabJoin' : 'tabHelp').classList.add('active');
    applyFilters();
  }

  function resetFilters() {
    activeCat = 'all';
    activeTab = 'all';
    document.getElementById('searchInput').value = '';
    document.querySelectorAll('#catChips .filter-chip').forEach(c => c.classList.remove('active'));
    document.querySelector('#catChips .filter-chip[data-cat="all"]').classList.add('active');
    document.getElementById('tabAll').classList.add('active');
    document.getElementById('tabJoin').classList.remove('active');
    document.getElementById('tabHelp').classList.remove('active');
    applyFilters();
  }

  function applyFilters() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    let filtered = allEvents.filter(ev => {
      if (activeCat !== 'all' && ev.category_id != activeCat) return false;
      if (activeTab === 'join' && !ev.can_participate) return false;
      if (activeTab === 'help' && !ev.can_help) return false;
      if (q && !ev.title.toLowerCase().includes(q) && !(ev.organizer_name||'').toLowerCase().includes(q)) return false;
      return true;
    });
    renderCards(filtered);
  }

  function renderCards(events) {
    const grid = document.getElementById('eventsGrid');
    document.getElementById('resultInfo').textContent = `${events.length}件のあそびを表示中`;
    if (!events.length) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
        <div class="empty-icon">🌿</div>
        <div class="empty-title">あそびが見つかりませんでした</div>
        <div class="empty-desc">絞り込み条件を変えて探してみてください</div>
      </div>`;
      return;
    }
    grid.innerHTML = events.map(ev => {
      const cat = ev.event_categories;
      const catClass = CAT_COLORS[ev.category_id] || 'cat-1';
      const grad = THUMB_GRADIENTS[(ev.category_id - 1) % THUMB_GRADIENTS.length] || THUMB_GRADIENTS[0];
      const emoji = cat ? cat.emoji : '🎪';
      return `<div class="event-card" onclick="openModal(${ev.id})">
        <div class="card-thumb" style="background:${grad}">
          <span style="font-size:52px">${emoji}</span>
          <div class="card-cat-badge ${catClass}">${cat ? cat.name : ''}</div>
          ${ev.can_help ? '<div class="card-type-badge">🙌 スタッフ募集</div>' : (ev.can_participate ? '<div class="card-type-badge">✋ 参加者募集</div>' : '')}
        </div>
        <div class="card-body">
          <div class="card-title">${ev.title}</div>
          <div class="card-meta">
            ${ev.event_date ? `<div class="card-meta-item">🗓️ ${ev.event_date}</div>` : ''}
            ${ev.location ? `<div class="card-meta-item">📍 ${ev.location}</div>` : ''}
            <div class="card-meta-item">👤 ${ev.organizer_name || ''}</div>
          </div>
        </div>
        <div class="card-footer">
          ${ev.target_audience ? `<span class="card-tag">${ev.target_audience}</span>` : ''}
          ${ev.fee ? `<span class="card-tag">💴 ${ev.fee}</span>` : '<span class="card-tag">💴 無料</span>'}
          ${ev.can_participate ? '<span class="card-tag can-join">✋ 参加OK</span>' : ''}
          ${ev.can_help ? '<span class="card-tag can-help">🙌 手伝いOK</span>' : ''}
        </div>
      </div>`;
    }).join('');
  }

  function openModal(id) {
    const ev = allEvents.find(e => e.id === id);
    if (!ev) return;
    const cat = ev.event_categories;
    const catClass = CAT_COLORS[ev.category_id] || 'cat-1';

    document.getElementById('modalHeader').innerHTML = `
      <div class="modal-category-badge ${catClass}">${cat ? cat.emoji + ' ' + cat.name : ''}</div>
      <div class="modal-title">${ev.title}</div>
      <div class="modal-organizer">📍 ${ev.organizer_name || ''}　${ev.organizer_type ? '｜ ' + ev.organizer_type : ''}</div>`;

    const org = allOrgs.find(o => o.org_name === ev.organizer_name);

    document.getElementById('modalBody').innerHTML = `
      <p class="modal-desc">${ev.description || ''}</p>
      <div class="info-grid">
        ${ev.event_date ? `<div class="info-item"><div class="info-label">🗓️ 開催時期</div><div class="info-value">${ev.event_date}</div></div>` : ''}
        ${ev.location ? `<div class="info-item"><div class="info-label">📍 場所</div><div class="info-value">${ev.location}<br><a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(ev.location)}" target="_blank" rel="noopener" style="font-size:11px;color:var(--green);font-weight:700;">🗺️ Googleマップで見る</a></div></div>` : ''}
        ${ev.target_audience ? `<div class="info-item"><div class="info-label">👥 対象</div><div class="info-value">${ev.target_audience}</div></div>` : ''}
        <div class="info-item"><div class="info-label">💴 参加費</div><div class="info-value">${ev.fee || '無料'}</div></div>
        ${ev.max_participants ? `<div class="info-item"><div class="info-label">🙋 定員</div><div class="info-value">${ev.max_participants}名</div></div>` : ''}
      </div>
      ${ev.event_url ? `<a href="${ev.event_url}" target="_blank" rel="noopener" style="display:block;background:var(--green);color:white;text-align:center;padding:13px;border-radius:14px;font-size:14px;font-weight:800;text-decoration:none;margin-bottom:16px;">🔗 イベント詳細ページを見る</a>` : ''}
      ${ev.knowhow_summary ? `<div style="background:#F0FBF5;border-radius:14px;padding:16px;margin-bottom:16px"><div style="font-size:13px;font-weight:800;color:var(--green);margin-bottom:8px">💡 ノウハウ・ポイント</div><div style="font-size:14px;color:#444;line-height:1.9">${ev.knowhow_summary}</div></div>` : ''}
      ${ev.tools_needed ? `<div style="background:#FFF8E1;border-radius:14px;padding:16px;margin-bottom:16px"><div style="font-size:13px;font-weight:800;color:#F57F17;margin-bottom:8px">🛠️ 必要な道具・準備物</div><div style="font-size:14px;color:#444;line-height:1.9">${ev.tools_needed}</div></div>` : ''}
      ${org && org.contact_email ? `<div class="contact-box"><div class="contact-title">📧 このあそびについて問い合わせる</div><a href="mailto:${org.contact_email}" class="contact-email">${org.contact_email}</a></div>` : ''}
      ${(ev.can_participate || ev.can_help) ? `
      <div class="form-section">
        <div class="form-title">このイベントに関わる</div>
        <div class="form-sub">仕掛け人になろう！自ら動いてコンタクトする</div>
        ${ev.can_participate && ev.can_help ? `
        <div class="form-tabs">
          <button class="form-tab active" onclick="setTab(this,'参加したい')">✋ 参加したい</button>
          <button class="form-tab" onclick="setTab(this,'お手伝いしたい')">🙌 お手伝いしたい</button>
        </div>` : ''}
        <form id="reqForm-${ev.id}" onsubmit="submitRequest(event,${ev.id})">
          <div class="form-group"><label>お名前</label><input type="text" name="name" placeholder="山田 太郎" required></div>
          <div class="form-group"><label>メールアドレス</label><input type="email" name="email" placeholder="example@mail.com" required></div>
          <div class="form-group"><label>所属（学校・団体名）</label><input type="text" name="school_name" placeholder="○○小おやじの会"></div>
          <div class="form-group"><label>メッセージ・質問</label><textarea name="message" placeholder="気になることや質問があれば"></textarea></div>
          <button type="submit" class="submit-btn" id="sbtn-${ev.id}">送信する →</button>
          <div class="success-msg" id="smsg-${ev.id}">🎉 送信しました！後ほどご連絡します。</div>
        </form>
      </div>` : ''}`;

    document.getElementById('modalOverlay').classList.add('show');
    document.getElementById('modalCloseBtn').classList.add('show');
    document.body.style.overflow = 'hidden';
  }

  function setTab(btn, type) {
    currentRequestType = type;
    document.querySelectorAll('.form-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  async function submitRequest(e, eventId) {
    e.preventDefault();
    const form = e.target;
    const btn = document.getElementById(`sbtn-${eventId}`);
    btn.disabled = true; btn.textContent = '送信中...';
    const { error } = await client.from('participation_requests').insert({
      event_id: eventId, name: form.name.value, email: form.email.value,
      school_name: form.school_name.value, request_type: currentRequestType, message: form.message.value
    });
    if (!error) { form.style.display = 'none'; document.getElementById(`smsg-${eventId}`).style.display = 'block'; }
    else { btn.disabled = false; btn.textContent = '送信する →'; alert('送信に失敗しました。'); }
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('show');
    document.getElementById('modalCloseBtn').classList.remove('show');
    document.body.style.overflow = '';
  }
  function handleOverlayClick(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }
</script>
</body>
</html>
