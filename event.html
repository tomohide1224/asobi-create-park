<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>あそびの詳細 | ASOBI CREATE PARK</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/pages/events.css">
  <link rel="stylesheet" href="/css/pages/cases.css">
  <style>
    .detail-wrap { max-width: 880px; margin: 0 auto; padding: 0 20px 60px; }
    .detail-hero { position: relative; width: 100%; aspect-ratio: 3 / 2; border-radius: 22px; overflow: hidden; margin: 8px 0 22px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 30px rgba(0,0,0,.08); }
    .detail-hero img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .detail-hero .hero-emoji { font-size: 96px; }
    .detail-cat-badge { position: absolute; top: 16px; left: 16px; padding: 7px 15px; border-radius: 999px; font-size: 13px; font-weight: 800; color: #fff; box-shadow: 0 3px 10px rgba(0,0,0,.18); }
    .detail-status-badge { position: absolute; top: 16px; right: 16px; padding: 7px 14px; border-radius: 999px; font-size: 12px; font-weight: 800; background: rgba(255,255,255,.92); color: var(--navy); box-shadow: 0 3px 10px rgba(0,0,0,.15); }
    .detail-title { font-size: 26px; font-weight: 900; color: var(--navy); line-height: 1.35; margin: 0 0 10px; }
    .detail-org { font-size: 14px; color: var(--gray); margin-bottom: 18px; }
    .detail-desc { font-size: 15px; line-height: 1.9; color: #333; white-space: pre-wrap; margin-bottom: 24px; }
    .detail-section-title { font-size: 15px; font-weight: 800; color: var(--navy); margin: 26px 0 14px; padding-left: 11px; border-left: 4px solid var(--green); }
    .detail-back { display: inline-flex; align-items: center; gap: 6px; margin: 26px 0 0; color: var(--green); font-weight: 700; font-size: 14px; text-decoration: none; }
    /* 地図（Googleマップ埋め込み） */
    .detail-map-wrap { border-radius: 16px; overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,.06); margin-bottom: 6px; }
    .detail-map { width: 100%; height: 260px; border: 0; display: block; }
    .detail-map-link { display: inline-block; font-size: 12px; color: var(--green); font-weight: 700; text-decoration: none; margin: 2px 0 6px; }
    .detail-map-note { font-size: 13px; color: #444; line-height: 1.7; background: #F8F9FA; border-radius: 12px; padding: 12px 14px; margin-top: 8px; white-space: pre-wrap; }
    .detail-loading, .detail-notfound { text-align: center; padding: 80px 20px; color: var(--gray); }
    .detail-notfound .nf-icon { font-size: 56px; margin-bottom: 14px; }
    /* 応援ボタン */
    .recruit-actions { display:flex; gap:10px; }
    .recruit-actions button { flex:1; padding:13px 8px; border-radius:12px; border:1.5px solid #e0e0e0; background:#fff; font-size:14px; font-weight:800; cursor:pointer; transition:.15s; }
    .recruit-actions button:hover { background:#fafafa; }
    .recruit-actions .btn-fav.active { border-color:#e91e63; color:#e91e63; background:#fff0f5; }
    .recruit-actions .btn-hand.active { border-color:var(--green); color:var(--green); background:#f0fbf5; }
    .recruit-actions .btn-hand:disabled { cursor:default; opacity:.9; }
    /* 手を上げるモーダル */
    .hand-modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); display:none; align-items:center; justify-content:center; z-index:1000; padding:20px; }
    .hand-modal-overlay.open { display:flex; }
    .hand-modal-card { background:#fff; border-radius:18px; padding:24px; max-width:420px; width:100%; box-shadow:0 20px 60px rgba(0,0,0,.2); }
    .hand-modal-card h3 { margin:0 0 6px; font-size:18px; }
    .hand-modal-card p { margin:0 0 14px; font-size:13px; color:var(--gray); }
    .hand-modal-card textarea { width:100%; min-height:90px; border:1.5px solid #e0e0e0; border-radius:12px; padding:12px; font-size:14px; font-family:inherit; box-sizing:border-box; resize:vertical; }
    .hand-modal-actions { display:flex; gap:10px; margin-top:16px; }
    .hand-modal-actions button { flex:1; padding:12px; border-radius:12px; border:none; font-size:14px; font-weight:800; cursor:pointer; }
    .hand-modal-actions button:not(.primary) { background:#f0f0f0; color:#555; }
    .hand-modal-actions button.primary { background:var(--green); color:#fff; }
  </style>
</head>
<body>

<div id="site-header"></div>

<div class="breadcrumb">
  <div class="breadcrumb-inner">
    <a href="/index.html">トップ</a>
    <span class="breadcrumb-sep">›</span>
    <a href="/events.html">あそびを探す</a>
    <span class="breadcrumb-sep">›</span>
    <span id="crumbTitle">詳細</span>
  </div>
</div>

<div class="detail-wrap">
  <div id="detailContent">
    <div class="detail-loading">
      <div class="spinner"></div>
      <div style="font-size:14px;margin-top:12px;">読み込み中...</div>
    </div>
  </div>
</div>

<!-- 手を上げるモーダル -->
<div class="hand-modal-overlay" id="handModal">
  <div class="hand-modal-card">
    <h3>🙋 この企画に手を上げる</h3>
    <p>主催者へ「手伝いたい・応援したい」気持ちを届けます。ひとことメッセージを添えられます（任意）。</p>
    <textarea id="handMessage" placeholder="例：ぜひお手伝いさせてください！こんなことができます…"></textarea>
    <div class="hand-modal-actions">
      <button type="button" onclick="closeHandModal()">キャンセル</button>
      <button type="button" class="primary" onclick="submitHand()">🙋 手を上げる</button>
    </div>
  </div>
</div>

<div id="site-footer"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/common.js"></script>
<script src="/js/favorites.js?v=20260724"></script>
<script src="/js/pages/event-detail.js?v=20260724"></script>
<script>
  loadHeader();
  loadFooter();
</script>
</body>
</html>
